name: React Frontend CI/CD

on:
  push:
    branches: [main, develop]
    paths:
      - 'frontend/**'
  pull_request:
    branches: [main, develop]
    paths:
      - 'frontend/**'

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
          
      - name: Install dependencies
        run: |
          cd frontend
          npm ci --legacy-peer-deps
          
      - name: Run tests
        run: |
          cd frontend
          npm test -- --watchAll=false
          
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          
      - name: Install dependencies
        run: |
          cd frontend
          npm ci --legacy-peer-deps
          
      - name: Run ESLint
        run: |
          cd frontend
          npm run lint || true

  build:
    runs-on: ubuntu-latest
    needs: [test, lint]
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
          
      - name: Install dependencies
        run: |
          cd frontend
          npm ci --legacy-peer-deps
          
      - name: Build for development
        run: |
          cd frontend
          npm run build:dev
        env:
          REACT_APP_API_URL: http://localhost:8000
          
      - name: Build for production
        run: |
          cd frontend
          npm run build:prod
        env:
          REACT_APP_API_URL: https://tas-backend-8emb.onrender.com
